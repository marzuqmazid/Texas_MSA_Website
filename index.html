		<!-- Particle Animation -->
			<script>
			(function () {

				var canvas = document.getElementById('particles-canvas');
				var ctx    = canvas.getContext('2d');

				canvas.style.cssText = [
					'position:absolute',
					'top:0', 'left:0',
					'width:100%', 'height:100%',
					'z-index:3',
					'pointer-events:none',
					'display:block'
				].join(';');

				var PARTICLE_COUNT  = 88;
				var CONNECTION_DIST = 130;
				var BASE_SPEED      = 0.28;
				var DOT_MIN_R       = 1.2;
				var DOT_MAX_R       = 2.8;

				var COLORS = [
					[255, 220, 120],
					[255, 255, 255],
					[255, 175,  55],
					[255, 240, 160],
				];

				var W, H, raf;
				var particles = [];
				var mouse = { x: -9999, y: -9999 };

				function resize() {
					W = canvas.width  = window.innerWidth;
					H = canvas.height = window.innerHeight;
				}

				function makeParticle() {
					var col   = COLORS[Math.floor(Math.random() * COLORS.length)];
					var alpha = +(0.15 + Math.random() * 0.45).toFixed(2);
					var angle = Math.random() * Math.PI * 2;
					var speed = BASE_SPEED * (0.4 + Math.random() * 1.2);
					return {
						x:  Math.random() * (W || window.innerWidth),
						y:  Math.random() * (H || window.innerHeight),
						r:  DOT_MIN_R + Math.random() * (DOT_MAX_R - DOT_MIN_R),
						vx: Math.cos(angle) * speed,
						vy: Math.sin(angle) * speed,
						col:   col,
						alpha: alpha,
					};
				}

				function init() {
					resize();
					particles = [];
					for (var i = 0; i < PARTICLE_COUNT; i++) {
						particles.push(makeParticle());
					}
				}

				function draw() {
					ctx.clearRect(0, 0, W, H);

					for (var i = 0; i < particles.length; i++) {
						var p = particles[i];
						p.x += p.vx;  p.y += p.vy;
						if (p.x < -5)  p.x = W + 5;
						if (p.x > W+5) p.x = -5;
						if (p.y < -5)  p.y = H + 5;
						if (p.y > H+5) p.y = -5;
					}

					for (var i = 0; i < particles.length - 1; i++) {
						var a = particles[i];
						for (var j = i + 1; j < particles.length; j++) {
							var b    = particles[j];
							var dx   = a.x - b.x;
							var dy   = a.y - b.y;
							var dist = Math.sqrt(dx*dx + dy*dy);
							if (dist < CONNECTION_DIST) {
								var la = (1 - dist / CONNECTION_DIST) * Math.min(a.alpha, b.alpha) * 0.6;
								ctx.beginPath();
								ctx.moveTo(a.x, a.y);
								ctx.lineTo(b.x, b.y);
								ctx.strokeStyle = 'rgba(255,210,100,' + la.toFixed(3) + ')';
								ctx.lineWidth   = 0.6;
								ctx.stroke();
							}
						}
					}

					for (var i = 0; i < particles.length; i++) {
						var p = particles[i];
						ctx.beginPath();
						ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
						ctx.fillStyle   = 'rgba(' + p.col[0] + ',' + p.col[1] + ',' + p.col[2] + ',' + p.alpha + ')';
						ctx.shadowColor = 'rgba(255,200,80,0.6)';
						ctx.shadowBlur  = 6;
						ctx.fill();
						ctx.shadowBlur  = 0;
					}

					raf = requestAnimationFrame(draw);
				}

				window.addEventListener('mousemove', function (e) {
					mouse.x = e.clientX;  mouse.y = e.clientY;
				});

				window.addEventListener('touchmove', function (e) {
					if (e.touches.length) {
						mouse.x = e.touches[0].clientX;
						mouse.y = e.touches[0].clientY;
					}
				}, { passive: true });

				(function attract() {
					for (var i = 0; i < particles.length; i++) {
						var p   = particles[i];
						var dx  = mouse.x - p.x;
						var dy  = mouse.y - p.y;
						var d   = Math.sqrt(dx*dx + dy*dy);
						if (d < 180 && d > 0) {
							p.vx += (dx / d) * 0.012;
							p.vy += (dy / d) * 0.012;
							var spd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
							var max = BASE_SPEED * 2.5;
							if (spd > max) { p.vx = (p.vx / spd) * max;  p.vy = (p.vy / spd) * max; }
						}
					}
					setTimeout(attract, 40);
				})();

				document.addEventListener('visibilitychange', function () {
					if (document.hidden) { cancelAnimationFrame(raf); } else { draw(); }
				});

				window.addEventListener('resize', resize);

				init();
				draw();

			})();
			</script>
